name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build packages
        run: bash scripts/build.sh ${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "KoalaCookies v${{ steps.version.outputs.VERSION }}"
          body: |
            ## KoalaCookies v${{ steps.version.outputs.VERSION }}

            ### Browser Packages
            - **Firefox:** `koala_cookies_firefox_v${{ steps.version.outputs.VERSION }}.zip`
            - **Chrome / Chromium:** `koala_cookies_chrome_v${{ steps.version.outputs.VERSION }}.zip`

            ### Installation
            - **Firefox:** `about:debugging` → Load Temporary Add-on → Select the zip
            - **Chrome:** `chrome://extensions` → Developer Mode → Load unpacked → Select extracted zip

            ### Changes
            See the [commit history](https://github.com/Shik3i/KoalaCookies/commits/main) for details.
          files: |
            releases/koala_cookies_firefox_v${{ steps.version.outputs.VERSION }}.zip
            releases/koala_cookies_chrome_v${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
          generate_release_notes: true
